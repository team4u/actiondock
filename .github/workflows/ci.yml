name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run Maven Tests
        run: mvn test

  admin-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actiondock-admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: actiondock-admin-ui/package-lock.json
      - name: Install UI Dependencies
        run: npm ci
      - name: Type Check UI
        run: npx tsc --noEmit
      - name: Build UI
        run: npm run build

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actiondock-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: actiondock-cli/package-lock.json
      - name: Install CLI Dependencies
        run: npm ci
      - name: Test CLI
        run: npm test
      - name: Build CLI
        run: npm run build
